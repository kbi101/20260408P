# Flyway Configuration for QuantEdge Studio
# Use: flyway -configFiles=flyway.conf migrate

# Database connection
flyway.url=jdbc:postgresql://localhost:5432/crystal_db
flyway.user=postgres
flyway.password=REPLACED_FOR_GITHUB
flyway.schemas=quant

# Migration location
flyway.locations=filesystem:sql/postgres/migrations

# Security Settings
flyway.cleanDisabled=true
flyway.baselineOnMigrate=true
flyway.baselineVersion=0
